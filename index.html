<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Networking CRM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>Networking CRM</h1>
            <nav>
                <button id="btn-contacts" class="nav-btn active">Contacts</button>
                <button id="btn-add-contact" class="nav-btn primary">+ Add Contact</button>
            </nav>
        </div>
    </header>

    <main>
        <!-- Contact List View -->
        <div id="view-list" class="view active">
            <div class="toolbar">
                <input type="text" id="search-input" placeholder="Search by name, email, phone..." />
                <select id="filter-pipeline">
                    <option value="">All Pipeline Stages</option>
                    <option value="Lead">Lead</option>
                    <option value="Active">Active</option>
                    <option value="Close">Close</option>
                    <option value="Follow Up">Follow Up</option>
                </select>
                <input type="text" id="filter-tag" placeholder="Filter by tag..." style="width:160px" />
            </div>
            <table id="contacts-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Pipeline</th>
                        <th>Tags</th>
                        <th>Follow-Up</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="contacts-tbody"></tbody>
            </table>
        </div>

        <!-- Contact Detail View -->
        <div id="view-detail" class="view">
            <div class="detail-header">
                <button id="btn-back" class="btn-secondary">&#8592; Back to Contacts</button>
                <button id="btn-edit-contact" class="btn-primary">Edit Contact</button>
                <button id="btn-delete-contact" class="btn-danger">Delete</button>
            </div>
            <div id="contact-detail-content"></div>
            <div class="activity-section">
                <h3>Activity Log</h3>
                <div class="add-activity">
                    <textarea id="activity-note" placeholder="Add a note... (Ctrl+Enter to submit)"></textarea>
                    <button id="btn-add-activity" class="btn-primary">Add Note</button>
                </div>
                <div id="activity-list"></div>
            </div>
        </div>
    </main>

    <!-- Add/Edit Contact Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">Add Contact</h2>
                <button id="modal-close">&times;</button>
            </div>
            <form id="contact-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Name <span class="required">*</span></label>
                        <input type="text" id="field-name" required />
                    </div>
                    <div class="form-group">
                        <label>Pipeline Status</label>
                        <select id="field-pipeline">
                            <option value="">None</option>
                            <option value="Lead">Lead</option>
                            <option value="Active">Active</option>
                            <option value="Close">Close</option>
                            <option value="Follow Up">Follow Up</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="field-email" />
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="field-phone" />
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Social Handle</label>
                        <input type="text" id="field-social" placeholder="@username or profile URL" />
                    </div>
                    <div class="form-group">
                        <label>Follow-Up Date</label>
                        <input type="date" id="field-followup" />
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>How We Met</label>
                        <input type="text" id="field-how-met" placeholder="Conference, intro, LinkedIn..." />
                    </div>
                    <div class="form-group">
                        <label>Tags <span class="hint">(comma separated)</span></label>
                        <input type="text" id="field-tags" placeholder="investor, founder, mentor" />
                    </div>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="field-notes" rows="4" placeholder="Background, context, conversation topics..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" id="btn-cancel-form" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Save Contact</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
